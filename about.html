<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이 블로그에 대하여 - Navhooe // 매원</title>
    <style>
        /* index.html과 완벽히 동일한 디자인 스타일 적용 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            /* 1. 배경색 변경: DEDDE0 */
            background-color: #DEDDE0;
            /* 1. 글자색 변경: 0000E7 */
            color: #0000E7;
            font-family: 'Courier New', Courier, monospace, 'Noto Sans KR', sans-serif;
            padding: 15px;
            line-height: 1.6;
        }
        /* 1. 링크 글자색 변경: 0000E7 */
        a { color: #0000E7; text-decoration: none; cursor: pointer; }
        
        header {
            border: 1px solid #0000E7;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .logo { font-size: 1.2rem !important; }
        footer {
            text-align: center;
            margin-top: 80px;
            padding-bottom: 30px;
            font-size: 14px !important;
            font-weight: bold;
        }

        /* 세부 글 형식의 컨테이너 */
        #app { max-width: 800px; margin: 0 auto; min-height: 50vh; }

        .about-wrap {
            padding-top: 20px;
        }
        
        /* 2. 제목: 이 블로그에 대하여 (이중선 디자인 유지) */
        .about-title {
            font-size: 36px !important; 
            font-weight: 900 !important;
            margin-bottom: 30px;
            line-height: 1.3;
            border-bottom: 3px double #0000E7; /* 1. 이중선 색상 변경: 0000E7 */
            padding-bottom: 20px;
        }
        
        /* 2. 내용: 이블로그에 대한 내용이 들어갑니다. */
        .about-content {
            font-size: 16px !important; 
            white-space: pre-wrap; /* HTML 직접 수정시 엔터 유지 */
            margin-bottom: 50px;
        }
        
        /* 블로그 메인으로 돌아가는 네비게이션 스타일 */
        .post-nav {
            text-align: center;
            margin-top: 50px;
            font-weight: bold;
        }
        .post-nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <a href="./" class="logo">Navhooe // 매원</a>
        <div>
            <a href="about.html" style="text-decoration:underline;">정보</a>
        </div>
    </header>

    <div id="app">
        <div class="about-wrap">
            <h1 class="about-title">이 블로그에 대하여</h1>
            <div class="about-content">
이 블로그에 대한 내용이 들어갑니다.

이곳은 자바스크립트를 사용하지 않고 직접 HTML을 수정하여 관리하는 정적 페이지입니다.
블로그 디자인 형식을 그대로 유지하도록 만들었습니다.
나중에 내용을 채워주세요.
            </div>
            
            <div class="post-nav">
                <a href="./">[ 블로그 홈으로 ]</a>
            </div>
        </div>
    </div>

    <footer>
        navhooe &copy; all rights reserved
    </footer>

</body>
</html>
