<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXL - 정보 블로그</title>
    <style>
        /* 기본 리셋 및 전역 스타일 */
        * { box-sizing: border-box; }
        body {
            background-color: #E2DAFC; /* 연보라색 배경 */
            color: #0000FF; /* 블루 텍스트 */
            font-family: 'Courier New', Courier, 'Noto Sans KR', sans-serif;
            margin: 0; 
            padding: 10px;
            line-height: 1.6;
            word-break: keep-all;
        }
        a {
            color: #0000FF;
            text-decoration: none;
            cursor: pointer;
        }
        
        /* 헤더 디자인 */
        header {
            border: 1px solid #0000FF;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 50px;
        }
        header .right-menu a {
            margin-left: 15px;
        }

        /* 메인 컨테이너 */
        #app {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 겹쳐진 박스 (메인 페이지 게시글 목록) */
        .post-card {
            border: 1px solid #0000FF;
            padding: 40px;
            margin-bottom: 60px;
            position: relative;
            background-color: #E2DAFC;
            z-index: 1;
        }
        /* 뒤에 깔리는 빈 박스 테두리 */
        .post-card::after {
            content: "";
            position: absolute;
            top: 5px;  /* 우측 하단으로 살짝 이동 */
            left: 5px; /* 우측 하단으로 살짝 이동 */
            width: 100%;
            height: 100%;
            border: 1px solid #0000FF;
            z-index: -1;
        }
        .post-date {
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .post-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            word-spacing: 2px;
        }
        .post-excerpt {
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: -webkit-box;
            -webkit-line-clamp: 4; /* 4줄까지만 보이고 자름 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-tags {
            font-size: 0.85rem;
        }
        .post-tags a {
            text-decoration: underline;
            margin-right: 10px;
        }

        /* 세부 글 페이지 디자인 */
        .detail-view {
            border-top: 3px double #0000FF; /* 이중선 */
            padding-top: 50px;
            padding-bottom: 50px;
        }
        .detail-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: left;
        }
        .detail-content {
            font-size: 1rem;
            margin-bottom: 40px;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }

        /* 푸터 */
        footer {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 20px;
            font-size: 0.9rem;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="?" class="logo">PIXL</a>
        <div class="right-menu">
            <a href="?">정보</a>
            <a href="?">블로그</a>
        </div>
    </header>

    <div id="app">
        <p style="text-align:center;">데이터를 불러오는 중입니다...</p>
    </div>

    <footer>
        <a href="#">GitHub Pages 제공.</a>
    </footer>

    <script>
        // ★ 여기에 구글 스프레드시트 CSV 웹 게시 링크를 넣으세요! ★
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTMsp7P7HBbupv1HqtWgw8koVO9p28myR3bFmMfLdaAaGeo72ufEhZo3meZHzjLTskYDeJg-TI4kBD/pub?gid=0&single=true&output=csv';

        // 간단한 CSV 파서 (따옴표 안의 쉼표 무시)
        function parseCSV(text) {
            const rows = [];
            const regex = /(?:,|\n|^)("(?:(?:"")*[^"]*)*"|[^",\n]*|(?:\n|$))/g;
            let match;
            let row = [];
            while ((match = regex.exec(text))) {
                let value = match[1];
                if (value === undefined) value = "";
                if (value.startsWith('"') && value.endsWith('"')) {
                    value = value.substring(1, value.length - 1).replace(/""/g, '"');
                }
                row.push(value.trim());
                if (match[0].startsWith('\n') || match[0].startsWith('\r')) {
                    rows.push(row);
                    row = [];
                }
            }
            if (row.length > 0) rows.push(row);
            
            const headers = rows[0];
            return rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((header, i) => obj[header.trim()] = row[i]);
                return obj;
            }).filter(item => item.id); // 빈 줄 제거
        }

        const app = document.getElementById('app');

        // 메인/태그 리스트 렌더링 함수
        function renderList(posts, filterTag = null) {
            app.innerHTML = '';
            
            if(filterTag) {
                app.innerHTML += `<h3 style="text-align:center; margin-bottom:40px;">#${filterTag} 태그된 글</h3>`;
            }

            posts.forEach(post => {
                const tagsArray = post.tags ? post.tags.split(',').map(t => t.trim()) : [];
                const tagsHTML = tagsArray.map(tag => `<a href="?tag=${encodeURIComponent(tag)}">${tag}</a>`).join('');
                // 목록에서는 첫번째 태그를 카테고리처럼 상단에 표시 (이미지 참고)
                const categoryHTML = tagsArray.length > 0 ? `<div style="margin-bottom:15px; font-size:0.9rem;"><a href="?tag=${encodeURIComponent(tagsArray[0])}">${tagsArray[0]}</a></div>` : '';

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-date">${post.date}</div>
                    <div class="post-title"><a href="?post=${post.id}">${post.title}</a></div>
                    <div class="post-excerpt">${post.content}</div>
                    ${categoryHTML}
                    <div class="post-tags">${tagsHTML}</div>
                `;
                app.appendChild(card);
            });

            if(posts.length === 0) app.innerHTML = '<p style="text-align:center;">작성된 글이 없습니다.</p>';
        }

        // 상세 글 렌더링 함수
        function renderPost(post) {
            if(!post) {
                app.innerHTML = '<p style="text-align:center;">글을 찾을 수 없습니다.</p>';
                return;
            }
            const tagsArray = post.tags ? post.tags.split(',').map(t => t.trim()) : [];
            const tagsHTML = tagsArray.map(tag => `<a href="?tag=${encodeURIComponent(tag)}">${tag}</a>`).join('');
            const categoryHTML = tagsArray.length > 0 ? `<div style="margin-bottom:30px; font-size:1rem;"><a href="?tag=${encodeURIComponent(tagsArray[0])}">${tagsArray[0]}</a></div>` : '';

            app.innerHTML = `
                <div class="detail-view">
                    <div class="detail-title">${post.title}</div>
                    <div class="detail-content">${post.content}</div>
                    ${categoryHTML}
                    <div class="post-tags">${tagsHTML}</div>
                </div>
            `;
        }

        // 초기화 및 라우팅
        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvData = await response.text();
                const posts = parseCSV(csvData);

                // URL에서 파라미터 읽기
                const urlParams = new URLSearchParams(window.location.search);
                const postId = urlParams.get('post');
                const tag = urlParams.get('tag');

                if (postId) {
                    // 세부 페이지 (id가 일치하는 글 찾기)
                    const post = posts.find(p => p.id === postId);
                    renderPost(post);
                } else if (tag) {
                    // 태그 필터링 목록
                    const filteredPosts = posts.filter(p => p.tags && p.tags.includes(tag));
                    renderList(filteredPosts, tag);
                } else {
                    // 전체 메인 목록 (최신순을 원하면 posts.reverse() 등 추가 가능)
                    renderList(posts);
                }
            } catch (error) {
                app.innerHTML = '<p style="text-align:center;">데이터를 불러오는 데 실패했습니다. 스프레드시트 URL을 확인해주세요.</p>';
                console.error(error);
            }
        }

        init();
    </script>
</body>
</html>
