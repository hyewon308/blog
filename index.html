<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navhooe // 매원</title>
    <style>
        /* 초기화 및 기본 셋팅 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #E2DAFC;
            color: #0000FF;
            font-family: 'Courier New', Courier, monospace, 'Noto Sans KR', sans-serif;
            padding: 15px;
            line-height: 1.6;
        }
        a { color: #0000FF; text-decoration: none; cursor: pointer; }
        
        /* 헤더와 푸터 */
        header {
            border: 1px solid #0000FF;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .logo { font-size: 1.2rem !important; }
        footer {
            text-align: center;
            margin-top: 80px;
            padding-bottom: 30px;
            font-size: 14px !important;
            font-weight: bold;
        }

        #app { max-width: 800px; margin: 0 auto; min-height: 50vh; }

        /* --- 메인 목록 페이지 스타일 --- */
        .post-card {
            border: 1px solid #0000FF;
            padding: 35px;
            margin-bottom: 50px;
            position: relative;
            background-color: #E2DAFC;
            z-index: 1;
        }
        .post-card::after {
            content: ""; position: absolute; top: 6px; left: 6px;
            width: 100%; height: 100%; border: 1px solid #0000FF; z-index: -1;
        }
        .post-date { font-size: 12px; margin-bottom: 10px; }
        
        .post-title {
            display: block;
            font-size: 32px !important; 
            font-weight: 900 !important; 
            margin-bottom: 15px;
        }
        .post-excerpt {
            font-size: 14px !important; 
            font-weight: normal !important;
            margin-bottom: 25px;
            display: -webkit-box !important;
            -webkit-line-clamp: 5 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
        }
        
        .tag-list a {
            font-size: 13px;
            text-decoration: underline;
            margin-right: 15px;
            font-weight: bold;
        }

        /* --- 세부 글(하부 페이지) 스타일 --- */
        .detail-wrap {
            /* 상단에 있던 이중선 삭제 */
            padding-top: 20px;
        }
        .detail-title {
            font-size: 36px !important; 
            font-weight: 900 !important;
            margin-bottom: 30px;
            line-height: 1.3;
            /* 제목 바로 아래로 이중선 이동 */
            border-bottom: 3px double #0000FF;
            padding-bottom: 20px;
        }
        .detail-content {
            font-size: 16px !important; 
            white-space: pre-wrap; 
            margin-bottom: 50px;
        }
        
        /* 이전글/다음글 네비게이션 */
        .post-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; /* 버튼 사이 간격 */
            margin-top: 50px;
            font-weight: bold;
        }
        .post-nav a { text-decoration: none; }
        .post-nav a:hover { text-decoration: underline; }
        .nav-hidden { visibility: hidden; } /* 자리 유지를 위한 투명 클래스 */
    </style>
</head>
<body>

    <header>
        <a href="?" class="logo">Navhooe // 매원</a>
        <div>
            <a href="?">정보</a> &nbsp;&nbsp;&nbsp; <a href="?">블로그</a>
        </div>
    </header>

    <div id="app"><p style="text-align:center;">DB 연결 중...</p></div>

    <footer>
        navhooe &copy; all rights reserved
    </footer>

    <script>
        // 1. 전달해주신 CSV 링크 하드코딩 완료
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTMsp7P7HBbupv1HqtWgw8koVO9p28myR3bFmMfLdaAaGeo72ufEhZo3meZHzjLTskYDeJg-TI4kBD/pub?gid=0&single=true&output=csv';

        function parseCSV(text) {
            const rows = []; let row = []; let cell = ''; let isQuoted = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i], next = text[i+1];
                if (c === '"' && isQuoted && next === '"') { cell += '"'; i++; }
                else if (c === '"') { isQuoted = !isQuoted; }
                else if (c === ',' && !isQuoted) { row.push(cell); cell = ''; }
                else if (c === '\n' && !isQuoted) {
                    row.push(cell); rows.push(row); row = []; cell = '';
                    if (text[i-1] === '\r') rows[rows.length-1][rows[rows.length-1].length-1] = rows[rows.length-1][rows[rows.length-1].length-1].slice(0, -1);
                } else { cell += c; }
            }
            if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
            
            const headers = rows[0].map(h => h.trim().toLowerCase());
            return rows.slice(1).map(r => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = r[i] ? r[i].trim() : "");
                return obj;
            }).filter(item => item.id);
        }

        const app = document.getElementById('app');

        function renderList(posts, currentTag = null) {
            app.innerHTML = '';
            if (currentTag) app.innerHTML = `<h2 style="text-align:center; margin-bottom: 40px;">#${currentTag}</h2>`;
            if (posts.length === 0) { app.innerHTML += `<p style="text-align:center;">글이 없습니다.</p>`; return; }

            // 배열을 복사한 뒤 역순(최신순)으로 렌더링
            [...posts].reverse().forEach(post => {
                const tags = post.tags ? post.tags.split(',').map(t => t.trim()).filter(t => t) : [];
                // CSV에 #을 직접 입력했을 경우 ##으로 나오는 것 방지
                const tagsHTML = tags.map(t => {
                    const cleanTag = t.startsWith('#') ? t.substring(1) : t;
                    return `<a href="?tag=${encodeURIComponent(cleanTag)}">#${cleanTag}</a>`;
                }).join('');
                
                app.innerHTML += `
                    <div class="post-card">
                        <div class="post-date">${post.date || ''}</div>
                        <a href="?post=${post.id}" class="post-title">${post.title || '제목 없음'}</a>
                        <div class="post-excerpt">${post.content || ''}</div>
                        <div class="tag-list">${tagsHTML}</div>
                    </div>
                `;
            });
        }

        // 3. 이전 글, 다음 글 기능 추가를 위해 전체 데이터(allPosts)를 함께 받음
        function renderPost(post, allPosts) {
            if (!post) { app.innerHTML = `<p style="text-align:center;">글을 찾을 수 없습니다.</p>`; return; }
            
            const tags = post.tags ? post.tags.split(',').map(t => t.trim()).filter(t => t) : [];
            const tagsHTML = tags.map(t => {
                const cleanTag = t.startsWith('#') ? t.substring(1) : t;
                return `<a href="?tag=${encodeURIComponent(cleanTag)}">#${cleanTag}</a>`;
            }).join('  ');

            // 현재 글의 위치(인덱스)를 찾아 이전/다음 글 계산
            const currentIndex = allPosts.findIndex(p => p.id === post.id);
            const prevPost = currentIndex > 0 ? allPosts[currentIndex - 1] : null;
            const nextPost = currentIndex < allPosts.length - 1 ? allPosts[currentIndex + 1] : null;

            // 네비게이션 버튼 HTML 생성 (글이 없으면 투명하게 처리하여 가운데 정렬 유지)
            let navHTML = `<div class="post-nav">`;
            navHTML += prevPost ? `<a href="?post=${prevPost.id}">[ 이전 글 ]</a>` : `<span class="nav-hidden">[ 이전 글 ]</span>`;
            navHTML += `<a href="?">[ 돌아가기 ]</a>`;
            navHTML += nextPost ? `<a href="?post=${nextPost.id}">[ 다음 글 ]</a>` : `<span class="nav-hidden">[ 다음 글 ]</span>`;
            navHTML += `</div>`;

            // 2. 제목 바로 아래에 선이 그어지도록 detail-title 스타일 적용됨
            app.innerHTML = `
                <div class="detail-wrap">
                    <div class="detail-title">${post.title || '제목 없음'}</div>
                    <div class="detail-content">${post.content || ''}</div>
                    <div class="tag-list" style="text-align:center; margin-top:40px;">${tagsHTML}</div>
                    ${navHTML}
                </div>
            `;
        }

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = parseCSV(await response.text());
                
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('post');
                const tag = params.get('tag');

                if (postId) {
                    renderPost(data.find(p => p.id === postId), data);
                } else if (tag) {
                    renderList(data.filter(p => p.tags && p.tags.split(',').map(t => {
                        let clean = t.trim();
                        return clean.startsWith('#') ? clean.substring(1) : clean;
                    }).includes(tag)), tag);
                } else {
                    renderList(data);
                }
            } catch (err) {
                app.innerHTML = `<p style="text-align:center;">DB 오류 발생: 링크를 확인해주세요.</p>`;
            }
        }
        init();
    </script>
</body>
</html>
