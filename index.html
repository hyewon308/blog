<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navhooe // 매원</title>
    <style>
        /* 초기화 및 기본 셋팅 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #E2DAFC;
            color: #0000FF;
            font-family: 'Courier New', Courier, monospace, 'Noto Sans KR', sans-serif;
            padding: 15px;
            line-height: 1.6;
        }
        a { color: #0000FF; text-decoration: none; cursor: pointer; }
        
        /* 1 & 6. 헤더와 푸터 (수정 완벽 반영) */
        header {
            border: 1px solid #0000FF;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .logo { font-size: 1.2rem !important; }
        footer {
            text-align: center;
            margin-top: 80px;
            padding-bottom: 30px;
            font-size: 14px !important;
            font-weight: bold;
        }

        #app { max-width: 800px; margin: 0 auto; min-height: 50vh; }

        /* --- 메인 목록 페이지 스타일 --- */
        .post-card {
            border: 1px solid #0000FF;
            padding: 35px;
            margin-bottom: 50px;
            position: relative;
            background-color: #E2DAFC;
            z-index: 1;
        }
        .post-card::after {
            content: ""; position: absolute; top: 6px; left: 6px;
            width: 100%; height: 100%; border: 1px solid #0000FF; z-index: -1;
        }
        .post-date { font-size: 12px; margin-bottom: 10px; }
        
        /* 2. 제목은 무조건 크고 굵게! 본문은 작게! */
        .post-title {
            display: block;
            font-size: 32px !important; /* 압도적으로 크게 */
            font-weight: 900 !important; /* 가장 굵게 */
            margin-bottom: 15px;
        }
        .post-excerpt {
            font-size: 14px !important; /* 본문은 확실히 작게 */
            font-weight: normal !important;
            margin-bottom: 25px;
            /* 본문 5줄 제한 강제 적용 */
            display: -webkit-box !important;
            -webkit-line-clamp: 5 !important;
            -webkit-box-orient: vertical !important;
            overflow: hidden !important;
        }
        
        /* 3. 태그 (분류 기능) */
        .tag-list a {
            font-size: 13px;
            text-decoration: underline;
            margin-right: 15px;
            font-weight: bold;
        }

        /* --- 4 & 5. 세부 글(하부 페이지) 스타일 --- */
        .detail-wrap {
            border-top: 4px double #0000FF;
            padding-top: 40px;
        }
        .detail-title {
            font-size: 36px !important; /* 세부 페이지 제목은 더 크게 */
            font-weight: 900 !important;
            margin-bottom: 30px;
            line-height: 1.3;
        }
        .detail-content {
            font-size: 16px !important; /* 본문 정상 크기 */
            white-space: pre-wrap; /* 엔터(줄바꿈) 완벽 유지 */
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <header>
        <a href="?" class="logo">Navhooe // 매원</a>
        <div>
            <a href="?">정보</a> &nbsp;&nbsp;&nbsp; <a href="?">블로그</a>
        </div>
    </header>

    <div id="app"><p style="text-align:center;">DB 연결 중...</p></div>

    <footer>
        navhooe &copy; all rights reserved
    </footer>

    <script>
        // ★ 여기에 구글 스프레드시트 CSV 웹 게시 링크를 넣으세요! ★
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTMsp7P7HBbupv1HqtWgw8koVO9p28myR3bFmMfLdaAaGeo72ufEhZo3meZHzjLTskYDeJg-TI4kBD/pub?gid=0&single=true&output=csv';

        // 가장 안정적인 CSV 파싱 (데이터 엉킴 방지)
        function parseCSV(text) {
            const rows = []; let row = []; let cell = ''; let isQuoted = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i], next = text[i+1];
                if (c === '"' && isQuoted && next === '"') { cell += '"'; i++; }
                else if (c === '"') { isQuoted = !isQuoted; }
                else if (c === ',' && !isQuoted) { row.push(cell); cell = ''; }
                else if (c === '\n' && !isQuoted) {
                    row.push(cell); rows.push(row); row = []; cell = '';
                    if (text[i-1] === '\r') rows[rows.length-1][rows[rows.length-1].length-1] = rows[rows.length-1][rows[rows.length-1].length-1].slice(0, -1);
                } else { cell += c; }
            }
            if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
            
            const headers = rows[0].map(h => h.trim().toLowerCase());
            return rows.slice(1).map(r => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = r[i] ? r[i].trim() : "");
                return obj;
            }).filter(item => item.id);
        }

        const app = document.getElementById('app');

        // 목록 페이지 그리기
        function renderList(posts, currentTag = null) {
            app.innerHTML = '';
            if (currentTag) app.innerHTML = `<h2 style="text-align:center; margin-bottom: 40px;">#${currentTag}</h2>`;
            if (posts.length === 0) { app.innerHTML += `<p style="text-align:center;">글이 없습니다.</p>`; return; }

            posts.reverse().forEach(post => {
                const tags = post.tags ? post.tags.split(',').map(t => t.trim()).filter(t => t) : [];
                const tagsHTML = tags.map(t => `<a href="?tag=${encodeURIComponent(t)}">#${t}</a>`).join('');
                
                app.innerHTML += `
                    <div class="post-card">
                        <div class="post-date">${post.date || ''}</div>
                        <a href="?post=${post.id}" class="post-title">${post.title || '제목 없음'}</a>
                        <div class="post-excerpt">${post.content || ''}</div>
                        <div class="tag-list">${tagsHTML}</div>
                    </div>
                `;
            });
        }

        // 세부 페이지 그리기
        function renderPost(post) {
            if (!post) { app.innerHTML = `<p style="text-align:center;">글을 찾을 수 없습니다.</p>`; return; }
            
            const tags = post.tags ? post.tags.split(',').map(t => t.trim()).filter(t => t) : [];
            const tagsHTML = tags.map(t => `<a href="?tag=${encodeURIComponent(t)}">#${t}</a>`).join('');

            app.innerHTML = `
                <div class="detail-wrap">
                    <div class="detail-title">${post.title || '제목 없음'}</div>
                    <div class="detail-content">${post.content || ''}</div>
                    <div class="tag-list" style="text-align:center; margin-top:40px;">${tagsHTML}</div>
                    <div style="text-align:center; margin-top:30px;"><a href="?">[ 돌아가기 ]</a></div>
                </div>
            `;
        }

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = parseCSV(await response.text());
                
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('post');
                const tag = params.get('tag');

                if (postId) {
                    renderPost(data.find(p => p.id === postId));
                } else if (tag) {
                    renderList(data.filter(p => p.tags && p.tags.split(',').map(t=>t.trim()).includes(tag)), tag);
                } else {
                    renderList(data);
                }
            } catch (err) {
                app.innerHTML = `<p style="text-align:center;">DB 오류 발생</p>`;
            }
        }
        init();
    </script>
</body>
</html>
